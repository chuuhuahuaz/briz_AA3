<!DOCTYPE html>
<html>
<head>
  <title>Pre-Order Form</title>

  <style>
body {
  font-family: Arial;

}

.container {
  width: 500px;
  margin: auto;
  background: #ffffff;
  padding: 25px;
  border-radius: 18px;
  margin-top: 50px;
  box-shadow: 0 8px 18px rgba(0,0,0,0.08);
  border: 2px solid #e9d5ff;
}

h2 {
  text-align: center;
  color: #7c3aed;
}

p {
  color: #555;
  line-height: 1.5;
}

label {
  font-weight: bold;
  color: #444;
}

input, select {
  width: 95%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 10px;
  border: 1px solid #cbd5e1;
  background: #f8fafc;
}

input:focus, select:focus {
  outline: none;
  border: 1px solid #93c5fd;
  background: #ffffff;
}

#terms {
  width: 10%;
}

button {
  padding: 11px;
  width: 100%;
  margin-top: 8px;
  background: #a5b4fc;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  background: #818cf8;
}

.error {
  color: #dc2626;
  margin-bottom: 10px;
  min-height: 18px;
  background: #fee2e2;
  padding: 8px;
  border-radius: 8px;
}
</style>

</head>

<body>

<div class="container">

  <h2>Science Project Pre-Order</h2>

  <p>
    K.A.A.G.A.P.A.Y. is a smart wearable device that helps monitor patients
    through reminders, alerts, and communication features.
    It supports hospitals and home caregivers.
    Choose your preferred package below.
  </p>

  <div id="errorMsg" class="error"></div>

  <form onsubmit="return handleOrder()">

    <label>Name:</label>
    <input type="text" id="name">

    <label>Product:</label>
    <select id="variant">
      <option value="">Select</option>
      <option value="Home Package|3000">Home Package (PHP 3000)</option>
      <option value="Hospital Package|3500">Hospital Package (PHP 3500)</option>
    </select>

    <label>Quantity:</label>
    <input type="number" id="quantity">

    <label>Pickup Method:</label>
    <select id="pickup">
      <option value="">Select</option>
      <option value="Delivery">Delivery</option>
      <option value="Meetup">Meetup</option>
    </select>

    <label>Address (for delivery only):</label>
    <input type="text" id="address">

    <label>
      <input type="checkbox" id="terms"> I accept terms
    </label>

    <br><br>

    <button type="button" onclick="loadPreviousOrder()">Load Previous Order</button>
    <button type="submit">Submit</button>

  </form>
</div>

<script>

function setCookie(name, value, maxAge) {
  document.cookie =
    name + "=" + encodeURIComponent(value) +
    ";max-age=" + maxAge +
    ";path=/";
}

function getCookie(name) {

  let cookies = document.cookie.split(";");

  for (let i = 0; i < cookies.length; i++) {

    let c = cookies[i].trim();

    if (c.indexOf(name + "=") == 0) {
      return decodeURIComponent(c.substring(name.length + 1));
    }
  }

  return "";
}

function deleteCookie(name) {
  document.cookie = name + "=;max-age=0;path=/";
}

function validateForm() {

  let errors = [];

  let name = document.getElementById("name").value.trim();
  let variant = document.getElementById("variant").value;
  let quantity = document.getElementById("quantity").value;
  let pickup = document.getElementById("pickup").value;
  let address = document.getElementById("address").value.trim();
  let terms = document.getElementById("terms").checked;

  if (name == "") {
    errors.push("Name is required.");
  }

  if (variant == "") {
    errors.push("Product is required.");
  }

  if (quantity == "") {
    errors.push("Quantity is required.");
  }
  else if (Number(quantity) <= 0) {
    errors.push("Quantity must be greater than 0.");
  }

  if (pickup == "") {
    errors.push("Pickup method is required.");
  }

  if (pickup == "Delivery" && address == "") {
    errors.push("Address is required for delivery.");
  }

  if (terms == false) {
    errors.push("You must accept terms.");
  }

  if (errors.length > 0) {
    document.getElementById("errorMsg").innerHTML =
      errors.join("<br>");
    return false;
  }

  return true;
}

function handleOrder() {

  document.getElementById("errorMsg").innerHTML = "";

  if (validateForm() == false) {
    return false;
  }

  let name = document.getElementById("name").value.trim();
  let variant = document.getElementById("variant").value;
  let quantity = document.getElementById("quantity").value;
  let pickup = document.getElementById("pickup").value;
  let address = document.getElementById("address").value.trim();

  setCookie("customerName", name, 604800);

  localStorage.setItem("product", variant);
  localStorage.setItem("quantity", quantity);
  localStorage.setItem("pickup", pickup);
  localStorage.setItem("address", address);

  window.location.href = "summary.html";

  return false;
}

function loadPreviousOrder() {

  let name = getCookie("customerName");
  let product = localStorage.getItem("product");
  let quantity = localStorage.getItem("quantity");
  let pickup = localStorage.getItem("pickup");
  let address = localStorage.getItem("address");

  if (name == "" && product == null) {
    document.getElementById("errorMsg").innerHTML =
      "No previous order data";
    return;
  }

  document.getElementById("name").value = name;
  document.getElementById("variant").value = product;
  document.getElementById("quantity").value = quantity;
  document.getElementById("pickup").value = pickup;
  document.getElementById("address").value = address;

  document.getElementById("errorMsg").innerHTML =
    "Previous order loaded.";
}

</script>

</body>
</html>
